# M9 offline-eval config (design doc 3-M9, proposal 4-D1).
#
# SINGLE SOURCE OF TRUTH for the offline-eval stage: generation params, the
# over_length budget, sampling, and the endpoint default. No magic numbers in code
# (design doc 1.3). tests/test_eval_offline_config.py guards the invariants
# (temperature=0, fixed max_tokens, over_length threshold, seed=42).
#
# Run (after `bash scripts/serving/serve.sh`), once per model group with the SAME
# config so all three see the identical sample batch (design doc 3-M9 DoD):
#   uv run python scripts/eval/run_offline_eval.py --config configs/eval_offline.yaml \
#       --model-tag dpo --endpoint http://127.0.0.1:8000/v1
#   # ... re-serve base / sft AWQ, then --model-tag base / sft against the endpoint.

seed: 42

# M3 product. Repo-relative; load_config resolves to an absolute path.
test_path: data/processed/test.jsonl
# Per-group results land under <output_dir>/<model_tag>/ (results.jsonl + summary.json).
output_dir: reports/eval_offline

generation:
  # Fixed for reproducibility (design doc 3-M9 step 2). temperature=0 -> greedy.
  temperature: 0.0
  # Voice replies are short; 256 is a generous cap that still bounds cost.
  max_tokens: 256
  # In-flight request cap against the endpoint (matches serve.yaml max_num_seqs=16).
  concurrency: 16

sampling:
  # null => evaluate the FULL test set (650 rows) -- cheapest "same batch"
  # guarantee and gives M10 a full pool to draw the same 100 ids from (same seed).
  # Set an int for a scenario-stratified sub-sample (deterministic by seed).
  n_samples: null

rules:
  # Reply token budget (design doc 3-M9 step 3; proposal 4-D1: speech wants short
  # replies). Tokens are a deterministic word/punct count (rules.count_tokens), so
  # the metric is identical across the three groups and needs no tokenizer.
  over_length_max_tokens: 120
  # Scenarios where the reply must ask a question (probe usage / bill / decision-maker).
  gathering_scenarios:
    - info_gathering
  # Appended to the default price/rate patterns (rules.DEFAULT_PRICE_PATTERNS,
  # hand-synced with M2). Leave empty to use the defaults only.
  extra_price_patterns: []
  # When non-empty, REPLACES the default role-break patterns; empty => defaults.
  role_break_patterns: []

# Smoke mode (--smoke): tiny run to validate the pipeline against the live endpoint
# before the full sweep (design doc 3-M9 test note: smoke 10 rows first).
smoke:
  n_samples: 10

endpoint:
  # OpenAI-compatible base URL (…/v1). Overridable via --endpoint.
  default: http://127.0.0.1:8000/v1
  # OpenAI `model` field sent to the endpoint (M8 --served-model-name).
  served_model: sales-agent-awq
