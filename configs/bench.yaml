# M11 load-test config (design doc 3-M11, proposal Bonus 3a).
#
# SINGLE SOURCE OF TRUTH for the Locust benchmark: concurrency ladder, per-tier
# duration, warm-up discard, endpoint, generation params, prompt pool. No magic
# numbers in code (design doc 1.3). tests/test_bench_config.py guards the
# invariants (tiers, durations, warmup, endpoint, seed=42; paths asserted
# OS-independently via Path(...).as_posix().endswith).
#
# Run (after `bash scripts/serving/serve.sh`, M8 endpoint online, 4070 free):
#   uv run python scripts/bench/run_bench.py --config configs/bench.yaml          # full ladder
#   uv run python scripts/bench/run_bench.py --config configs/bench.yaml --smoke  # 30s single tier
#   uv run python scripts/bench/plot_bench.py --config configs/bench.yaml         # re-aggregate/plot only

seed: 42

# M3 product. Repo-relative; load_config resolves to an absolute path. The prompt
# pool is each test dialogue's context up to (not including) the final assistant
# turn -- the same construction M9/the M8 demo use -- bucketed by length and
# round-robined so every tier mixes short/mid/long contexts.
test_path: data/processed/test.jsonl

# Per-tier raw_{c}.csv, bench_summary.csv, the three PNGs and manifest.json all land here.
output_dir: reports/bench

endpoint:
  # Locust --host: the OpenAI server BASE (no /v1). The locustfile posts to host+chat_route.
  # NOTE: these URL routes use non-path key names (chat_route / health_route, not
  # *_path / *_dir) so load_config leaves them LITERAL -- a "path" key would be
  # rewritten to an absolute host filesystem path and break the URL.
  host: http://127.0.0.1:8000
  # Streaming chat-completions route appended to host.
  chat_route: /v1/chat/completions
  # OpenAI `model` field sent to the endpoint (M8 --served-model-name).
  served_model: sales-agent-awq
  # Pre-flight readiness probe (GET host+health_route) before spending GPU time.
  health_route: /health

# Closed-loop ladder: each tier runs `concurrency` Locust users firing requests
# back-to-back (wait_time 0) so in-flight load stays ~= concurrency. 32 exceeds the
# M8 max_num_seqs=16 ON PURPOSE -- vLLM queues past 16, so TTFT rises and
# throughput plateaus; that knee is the real curve we want to measure (do NOT
# raise the server cap to make it look nicer).
ladder:
  concurrency: [1, 4, 8, 16, 32]
  # Wall time per tier (seconds). The first `warmup_s` of each tier are discarded
  # (steady window = run_time_s - warmup_s = 105s) so ramp-up / cold caches do not
  # skew the steady-state percentiles.
  run_time_s: 120
  warmup_s: 15

generation:
  # Fixed for reproducibility / comparability with M8 demo + M9 eval (greedy).
  temperature: 0.0
  # Voice replies are short; 256 caps generation time so tiers finish predictably.
  max_tokens: 256

# Smoke mode (--smoke): one short tier to validate the pipeline against the live
# endpoint before the ~12-min full ladder (design doc 3-M11 test note).
smoke:
  concurrency: [16]
  run_time_s: 30
  warmup_s: 5
