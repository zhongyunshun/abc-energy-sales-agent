# M10 LLM-as-a-Judge config (the M10 contract, the M10 judge target).
#
# SINGLE SOURCE OF TRUTH for the judge stage: judge model(s), sampling size, seed,
# retries, temperature, scoring range. No magic numbers in code (the config contract).
# tests/test_eval_judge_config.py guards the invariants (seed=42, judge models are
# NON-Google, n=100, 1-5 score range, no_diff threshold).
#
# Run (after M9 produced the three results.jsonl):
#   uv run python scripts/eval/run_judge.py --config configs/eval_judge.yaml --smoke   # 5/group first
#   uv run python scripts/eval/run_judge.py --config configs/eval_judge.yaml           # full 100/group

seed: 42

# M9 products -- one results.jsonl per model group. Repo-relative (resolved in the
# CLI against the repo root). The output subdir name is each dir's basename (the tag).
inputs:
  - reports/eval_offline/base
  - reports/eval_offline/sft
  - reports/eval_offline/dpo

# scores.jsonl + comparison.md land here (tracked in git, core report material for M12).
output_dir: reports/eval_judge

prompt_template_path: configs/prompts/judge.j2

# Judge models -- MUST be NON-Google to avoid same-source bias: the synthesizer used
# google/gemini-2.5-flash (the 2026-06-13 judge-selection note) and the design's default
# judge google/gemini-2.5-pro is also Google. These two are a different family from
# BOTH the synthesizer and the Qwen models under test (base/SFT/DPO), so the judge
# favors no group. Listing two cross-validates (each scores the full set blindly);
# config-driven, so it is trivial to switch or drop to one.
judge_models:
  - anthropic/claude-sonnet-4.6
  - openai/gpt-5.4

sampling:
  # Per group; the SAME ids are drawn for all three groups (the M10 sampling rule),
  # scenario-stratified and seed-fixed. 100 balances cost vs representativeness.
  n_samples: 100

# Judge sampling is fixed for reproducibility. temperature=0 -> deterministic scoring.
temperature: 0.0
# Room for 4 scores + 4 one-sentence reasons as JSON.
max_tokens: 512
# Parse-failure re-asks per (sample, judge) before counting a failure (design: <= 2).
max_retries: 2
# Transient API retries inside OpenRouterClient (exponential backoff).
client_max_retries: 3
# In-flight request cap (semaphore) across all judge calls.
concurrency: 8
# Some non-OpenAI models reject response_format=json_object via OpenRouter; the
# parser strips fences and extracts the first JSON object, so json mode is off by
# default and we rely on the prompt + robust parser.
use_json_mode: false

# Four scoring dimensions (the M10 scoring contract). hallucination is the
# "hallucination-free" axis (5 = invents nothing).
dimensions:
  - coherence
  - sales_logic
  - professionalism
  - hallucination
score_min: 1
score_max: 5
# Overall mean gap below which two groups are reported "no significant difference"
# (the M10 contract). We already know the real picture (SFT >> base, DPO ~ SFT) and
# the judge should reflect it honestly, not inflate DPO.
no_diff_threshold: 0.3

smoke:
  # --smoke: 5/group, to validate the live judge pipeline + cost before the full run.
  n_samples: 5

# Per-model OpenRouter pricing (USD per 1M tokens) for the cost estimate in the
# manifest + comparison.md. A model with no entry shows USD as n/a (no silent
# undercount). Rates verified against the OpenRouter models API (2026-06-14).
pricing:
  "anthropic/claude-sonnet-4.6":
    input_per_m: 3.0
    output_per_m: 15.0
  "openai/gpt-5.4":
    input_per_m: 2.5
    output_per_m: 15.0
